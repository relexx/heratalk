build:
  maxIssues: 0
  excludeCorrectable: false

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

comments:
  active: true
  AbsentOrWrongFileLicense:
    active: false  # Spotless handles license headers
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  UndocumentedPublicClass:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']
  UndocumentedPublicFunction:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']
  UndocumentedPublicProperty:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']

complexity:
  active: true
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
  TooManyFunctions:
    active: true
    thresholdInFiles: 20
    thresholdInClasses: 15

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true  # Enforces rule 19: no GlobalScope

empty-blocks:
  active: true

exceptions:
  active: true
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - InterruptedException
      - NumberFormatException

formatting:
  active: true
  android: true
  autoCorrect: false
  MaxLineLength:
    active: true
    maxLineLength: 120

naming:
  active: true
  FunctionNaming:
    active: true
    excludes: ['**/test/**', '**/androidTest/**']
  VariableNaming:
    active: true

performance:
  active: true

potential-bugs:
  active: true
  AvoidReferenceToMutableStateFlow:
    active: true

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '3', '4', '8', '16', '32', '100', '1000']
    ignoreAnnotated: ['Preview']
  UnusedImports:
    active: true
  WildcardImport:
    active: true

# TODO: Custom rule HardcodedStringInComposable — tracked in GitHub issue #12.
# Until then, Lint's HardcodedText error rule covers this check.
