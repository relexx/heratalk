name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 13114758

      - name: Install Android NDK and Build-Tools
        run: |
          sdkmanager "platforms;android-36" \
                     "build-tools;36.0.0" \
                     "ndk;28.2.13676358" \
                     "cmake;3.22.1"

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew testDebug --no-daemon

      - name: Verify 16 KB page alignment
        run: |
          APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          "$ANDROID_HOME/build-tools/36.0.0/zipalign" -c -P 16 -v 4 "$APK" \
            && echo "✓ 16 KB aligned" || (echo "✗ alignment failed" && exit 1)

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: heratalk-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: "**/build/reports/tests/"
