name: Feature Request
description: Suggest a new feature for HeraTalk
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This feature does not require a cloud backend or account system
          required: true
        - label: This feature does not require internet connectivity
          required: true
