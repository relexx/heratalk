name: Bug Report
description: Report a bug in HeraTalk
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open HeraTalk
        2. Join channel ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: HeraTalk version
    validations:
      required: true

  - type: input
    id: android
    attributes:
      label: Android version & device
      placeholder: "e.g. Android 15, Pixel 8"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logcat output (optional)
      render: shell
